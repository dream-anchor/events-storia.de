# Deploy-Workflow — bun-basiert seit 09.05.2026
# Trigger: push to main → SFTP zu IONOS (events-storia.de)
name: Deploy to IONOS (SFTP - events-storia.de)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Build project
        run: bun run build      # erzeugt ./dist
        env:
          # Oeffentliche Supabase-Client-Werte (Anon-Key + URL) — liegen ohnehin
          # im ausgelieferten Bundle. Seit .env nicht mehr im Repo ist, braucht
          # der Build sie hier (sonst schlaegt scripts/fetch-menu-data.ts fehl).
          # Bei Bedarf spaeter auf GitHub Secrets umstellen.
          VITE_SUPABASE_URL: "https://sovlfqncotxcjqseeawp.supabase.co"
          VITE_SUPABASE_PUBLISHABLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvdmxmcW5jb3R4Y2pxc2VlYXdwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ5NTM5NjMsImV4cCI6MjA4MDUyOTk2M30.t7WJB1ysn4QNDHpXIJ3Gzo5bxuXiTJpJJ-8DSkVpRyc"
          VITE_SUPABASE_PROJECT_ID: "sovlfqncotxcjqseeawp"

      - name: Deploy via SFTP to IONOS
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.IONOS_SFTP_HOST }}
          username: ${{ secrets.IONOS_SFTP_USER }}
          password: ${{ secrets.IONOS_SFTP_PASSWORD }}
          port: 22
          sftp_only: true
          local_path: "./dist/*"
          remote_path: "/events-storia-de"
          delete_remote_files: true

      - name: Upload .htaccess explicitly
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.IONOS_SFTP_HOST }}
          username: ${{ secrets.IONOS_SFTP_USER }}
          password: ${{ secrets.IONOS_SFTP_PASSWORD }}
          port: 22
          sftp_only: true
          local_path: "./public/.htaccess"
          remote_path: "/events-storia-de/.htaccess"
          delete_remote_files: false
